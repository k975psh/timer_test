<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우주탐험 뽀모도로 타이머</title>
    <!-- 폰트 로드: 아이들이 읽기 쉬운 둥글둥글하고 귀여운 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ========================================== -->
    <!-- [1] CSS 영역: 웹페이지의 디자인과 애니메이션을 담당합니다 -->
    <!-- ========================================== -->
    <style>
        /* --- 기본 전체 설정 --- */
        body {
            font-family: 'Jua', sans-serif; /* 전체 글꼴 설정 */
            background-color: #1a202c; /* 우주 배경색 (어두운 남색) */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.08) 2%, transparent 3%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.08) 2%, transparent 3%),
                radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.08) 2%, transparent 3%);
            color: #fff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- 애니메이션 설정 --- */
        /* 배경에 떨어지는 별똥별 효과 */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white, 0 0 20px white;
            animation: shoot 3s linear infinite;
        }
        @keyframes shoot {
            0% { transform: translateX(100vw) translateY(0); opacity: 1; }
            100% { transform: translateX(-100vw) translateY(100vh); opacity: 0; }
        }

        /* 텍스트나 캐릭터가 통통 튀는 효과 */
        .bounce {
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- 시계 및 타이머 디자인 --- */
        /* 시계의 둥근 배경 테두리 */
        .timer-circle {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
            border: 8px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        /* 시계 주변을 감싸는 동그란 진행률 바 */
        .progress-ring {
            position: absolute;
            top: -8px; left: -8px;
            width: 296px; height: 296px;
            transform: rotate(-90deg); /* 12시 방향부터 시작하도록 회전 */
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear;
            transform-origin: 50% 50%;
        }

        /* 🌟 아날로그 시계 바늘 디자인 🌟 */
        .hand {
            position: absolute;
            bottom: 50%; /* 시계 중심에서 시작 */
            left: 50%;
            transform-origin: 50% 100%; /* 회전의 중심축을 바늘의 맨 아래로 설정 */
            border-radius: 10px;
            z-index: 20;
            transition: transform 0.2s cubic-bezier(0.4, 2.08, 0.55, 0.44); /* 틱틱 거리는 움직임 효과 */
        }
        /* 분침 (두껍고 노란색) */
        .minute-hand {
            width: 8px;
            height: 90px;
            background-color: #fde047; 
            margin-left: -4px; /* 두께의 절반만큼 왼쪽으로 이동해 중앙을 맞춤 */
        }
        /* 초침 (얇고 빨간색) */
        .second-hand {
            width: 4px;
            height: 110px;
            background-color: #ef4444; 
            margin-left: -2px;
        }
        /* 시계 중심의 동그란 점 */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background-color: #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* 시계의 주요 분 표시 (0, 15, 30, 45) */
        .clock-number {
            position: absolute;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            z-index: 10;
        }

        /* 공부 모드/휴식 모드에 따른 색상 변화 */
        .mode-study .timer-circle { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        .mode-study .progress-ring__circle { stroke: #3b82f6; }
        .mode-break .timer-circle { box-shadow: 0 0 40px rgba(16, 185, 129, 0.6); }
        .mode-break .progress-ring__circle { stroke: #10b981; }

        /* --- 버튼 및 기타 UI 효과 --- */
        .btn-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-hover:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .btn-hover:active { transform: scale(0.95); }

        .character {
            font-size: 5rem;
            position: absolute;
            top: -50px;
            z-index: 30;
        }

        /* 모달 (팝업창) 디자인 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 4px solid #fff;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 400px;
            animation: modalPop 0.3s ease-out;
        }
        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 5분 경과 알림 시각 효과 */
        .flash-glow {
            animation: flash 1s ease-in-out;
        }
        @keyframes flash {
            0%, 100% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 80px rgba(253, 224, 71, 1); transform: scale(1.05); }
        }
        
        /* 5분 경과 시 나타나는 응원 메시지 */
        .interval-msg {
            position: absolute;
            top: -90px;
            left: 50%;
            transform: translateX(-50%);
            color: #fde047;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            opacity: 0;
            z-index: 40;
            pointer-events: none;
            transition: opacity 0.3s, top 0.3s;
            white-space: nowrap;
        }
        .interval-msg.show {
            opacity: 1;
            top: -110px;
        }
    </style>
</head>
<body class="mode-study">

    <!-- ========================================== -->
    <!-- [2] HTML 영역: 화면에 보여질 글자와 버튼, 그림을 배치합니다 -->
    <!-- ========================================== -->
    
    <!-- 장식용 별똥별 요소들 -->
    <div class="shooting-star" style="top: 10%; left: 20%; animation-delay: 0s;"></div>
    <div class="shooting-star" style="top: 30%; left: 70%; animation-delay: 1.5s;"></div>
    <div class="shooting-star" style="top: 60%; left: 40%; animation-delay: 2.2s;"></div>

    <div class="w-full max-w-md mx-auto px-4 z-10 flex flex-col items-center">
        
        <!-- 상단 제목과 상태 안내 메시지 -->
        <h1 class="text-4xl md:text-5xl text-yellow-300 font-bold mb-2 tracking-wider text-center drop-shadow-lg bounce">
            🚀 우주탐험 타이머 🚀
        </h1>
        <p class="text-xl text-blue-200 mb-8 text-center" id="status-text">
            우주선 출발 준비 중! (공부 시간)
        </p>

        <!-- 타이머 (시계) 영역 -->
        <div class="relative mb-10">
            <!-- 5분 알림 팝업 메시지 -->
            <div id="interval-msg" class="interval-msg">✨ 5분 달성! 파이팅! ✨</div>

            <!-- 시계 위에 올라간 캐릭터 아이콘 -->
            <div id="character" class="character bounce" style="left: 50%; transform: translateX(-50%);">👨‍🚀</div>

            <div class="timer-circle" id="timer-display-container">
                <!-- 원형 테두리 애니메이션 (진행률 바) -->
                <svg class="progress-ring">
                    <circle class="progress-ring__circle" stroke-width="12" fill="transparent" r="136" cx="148" cy="148"/>
                </svg>
                
                <!-- 🌟 아날로그 시계 구성 요소들 🌟 -->
                <!-- 시계 숫자 표시 -->
                <div class="clock-number" style="top: 15px; left: 50%; transform: translateX(-50%);">0</div>
                <div class="clock-number" style="bottom: 15px; left: 50%; transform: translateX(-50%);">30</div>
                <div class="clock-number" style="top: 50%; right: 15px; transform: translateY(-50%);">15</div>
                <div class="clock-number" style="top: 50%; left: 15px; transform: translateY(-50%);">45</div>

                <!-- 시계 바늘과 중심점 -->
                <div class="hand minute-hand" id="minute-hand"></div> <!-- 분침 -->
                <div class="hand second-hand" id="second-hand"></div> <!-- 초침 -->
                <div class="center-dot"></div> <!-- 중앙 동그라미 -->

                <!-- 작은 디지털 시간 표시 (아이들이 정확한 시간을 알기 쉽게 하단에 작게 배치) -->
                <div class="absolute bottom-10 text-3xl text-white/80 font-bold tracking-tight z-10 drop-shadow-md" id="digital-time-display">
                    25:00
                </div>
            </div>
        </div>

        <!-- 하단 조작 버튼들 (시작, 일시정지, 다시시작) -->
        <div class="flex gap-4 mb-8 w-full justify-center">
            <button id="start-btn" class="btn-hover bg-yellow-400 text-yellow-900 text-2xl px-8 py-4 rounded-full font-bold border-4 border-yellow-200 shadow-[0_6px_0_#b45309] active:shadow-[0_0px_0_#b45309] active:translate-y-[6px]">
                ▶️ 출발!
            </button>
            <button id="pause-btn" class="hidden btn-hover bg-orange-400 text-white text-2xl px-8 py-4 rounded-full font-bold border-4 border-orange-200 shadow-[0_6px_0_#c2410c] active:shadow-[0_0px_0_#c2410c] active:translate-y-[6px]">
                ⏸️ 잠깐멈춤
            </button>
            <button id="reset-btn" class="btn-hover bg-gray-500 text-white text-2xl px-6 py-4 rounded-full font-bold border-4 border-gray-300 shadow-[0_6px_0_#374151] active:shadow-[0_0px_0_#374151] active:translate-y-[6px]">
                🔄 다시
            </button>
        </div>

        <!-- 공부(탐험) / 휴식 모드 변경 버튼 -->
        <div class="flex gap-3 mb-4 bg-white/10 p-2 rounded-3xl backdrop-blur-sm">
            <button id="mode-study-btn" class="btn-hover bg-blue-500 text-white px-6 py-3 rounded-2xl text-xl font-bold shadow-md border-2 border-blue-300 w-32">
                📖 탐험
            </button>
            <button id="mode-break-btn" class="btn-hover bg-transparent text-gray-300 px-6 py-3 rounded-2xl text-xl font-bold hover:bg-white/10 w-32">
                🏕️ 휴식
            </button>
        </div>

        <!-- 탐험 시간 설정 영역 (탐험 모드에서만 표시됨) -->
        <div id="time-controls" class="flex items-center gap-4 mb-6 transition-opacity duration-300">
            <button id="decrease-time-btn" class="btn-hover bg-indigo-500 text-white text-3xl w-12 h-12 rounded-full font-bold shadow-md border-2 border-indigo-300 flex items-center justify-center pb-1">-</button>
            <div class="text-xl font-bold text-white bg-indigo-900/50 px-6 py-2 rounded-2xl border border-indigo-400 shadow-inner">
                시간: <span id="study-time-setting" class="text-yellow-300 text-2xl">25</span> 분
            </div>
            <button id="increase-time-btn" class="btn-hover bg-indigo-500 text-white text-3xl w-12 h-12 rounded-full font-bold shadow-md border-2 border-indigo-300 flex items-center justify-center pb-1">+</button>
        </div>

        <!-- 모은 보상(배지)을 보여주는 영역 -->
        <div class="w-full bg-white/5 rounded-3xl p-4 border border-white/10 text-center">
            <h2 class="text-xl text-purple-300 mb-2 font-bold">✨ 모은 우주 보물 ✨</h2>
            <div id="badge-container" class="flex gap-2 flex-wrap justify-center mt-4 min-h-[50px]">
                <span class="text-gray-500 text-sm" id="empty-badge-msg">아직 모은 보물이 없어요. 탐험을 완료해 보세요!</span>
            </div>
        </div>
    </div>

    <!-- 탐험/휴식이 끝났을 때 나오는 축하 팝업(모달) -->
    <div id="celebration-modal" class="modal">
        <div class="modal-content">
            <div class="text-6xl mb-4 bounce">🎉</div>
            <h2 class="text-3xl font-bold text-yellow-300 mb-2" id="modal-title">탐험 완료!</h2>
            <p class="text-xl text-white mb-6" id="modal-desc">정말 멋져요! 우주 보물을 획득했어요!</p>
            <div class="text-5xl mb-6" id="modal-reward">⭐</div>
            <button id="modal-close-btn" class="btn-hover bg-green-500 text-white text-2xl px-8 py-3 rounded-full font-bold border-4 border-green-300 shadow-[0_4px_0_#166534] active:shadow-[0_0px_0_#166534] active:translate-y-[4px]">
                다음으로!
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- [3] JavaScript 영역: 버튼 클릭 시 동작과 시간 계산 로직을 담당합니다 -->
    <!-- ========================================== -->
    <script>
        // HTML 문서에 있는 요소(버튼, 텍스트 등)들을 자바스크립트로 조종하기 위해 불러옵니다.
        const digitalTimeDisplay = document.getElementById('digital-time-display');
        const minuteHand = document.getElementById('minute-hand');
        const secondHand = document.getElementById('second-hand');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeStudyBtn = document.getElementById('mode-study-btn');
        const modeBreakBtn = document.getElementById('mode-break-btn');
        const statusText = document.getElementById('status-text');
        const character = document.getElementById('character');
        const badgeContainer = document.getElementById('badge-container');
        const emptyBadgeMsg = document.getElementById('empty-badge-msg');
        
        const modal = document.getElementById('celebration-modal');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalReward = document.getElementById('modal-reward');

        // 알림 효과를 위한 요소들
        const intervalMsg = document.getElementById('interval-msg');
        const timerDisplayContainer = document.getElementById('timer-display-container');

        // 새로 추가된 시간 설정 관련 요소들
        const timeControls = document.getElementById('time-controls');
        const decreaseTimeBtn = document.getElementById('decrease-time-btn');
        const increaseTimeBtn = document.getElementById('increase-time-btn');
        const studyTimeSetting = document.getElementById('study-time-setting');

        // 진행률 바(SVG 원)의 길이를 계산하여 채워지는 효과를 준비합니다.
        const circle = document.querySelector('.progress-ring__circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        // 타이머의 현재 상태를 기억하는 변수들입니다.
        let timerInterval; // 타이머 반복 함수를 담을 변수
        let defaultStudyTime = 25; // 기본 탐험 시간 (분 단위)
        let timeLeft = defaultStudyTime * 60; // 남은 시간 (초 단위, 기본은 25분)
        let totalTime = defaultStudyTime * 60; // 전체 시간 (진행률 계산용)
        let isRunning = false; // 현재 시간이 흐르고 있는지 여부
        let currentMode = 'study'; // 현재 모드 ('study' = 공부, 'break' = 휴식)
        let badges = []; // 모은 보상 아이콘을 저장하는 리스트

        const rewards = ['⭐', '🪐', '🚀', '👽', '☄️', '🌙', '🌟', '💎']; // 보상으로 줄 이모지들

        // --- 사운드 효과 함수 (Web Audio API 사용) ---
        // 별도의 오디오 파일 없이 브라우저에서 직접 소리를 만들어냅니다.
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 5분마다 울리는 알림 소리 (띠링! 소리가 3초 동안 3번 울리도록 수정)
        function playIntervalSound() {
            if(!audioCtx) return;
            
            // 3초 동안 1초 간격으로 3번 소리를 냅니다.
            for (let i = 0; i < 3; i++) {
                const startTime = audioCtx.currentTime + i;
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.type = 'sine'; // 부드럽고 맑은 소리
                osc.frequency.setValueAtTime(880, startTime); // 높은 도(A5) 근처
                osc.frequency.exponentialRampToValueAtTime(1760, startTime + 0.1); 
                
                gainNode.gain.setValueAtTime(0.3, startTime);
                // 소리의 여운이 0.8초 동안 천천히 사라지게 합니다.
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.8);
                
                osc.start(startTime);
                osc.stop(startTime + 0.8);
            }
        }

        // 타이머 완료 소리 (빰-빰-빠밤~)
        function playCompleteSound() {
            if(!audioCtx) return;
            const notes = [523.25, 659.25, 783.99, 1046.50]; // 도, 미, 솔, 높은도
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.type = 'triangle'; // 전자오락 같은 통통 튀는 소리
                osc.frequency.value = freq;
                const startTime = audioCtx.currentTime + (i * 0.15);
                gainNode.gain.setValueAtTime(0.4, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);
                osc.start(startTime);
                osc.stop(startTime + 0.3);
            });
        }

        // --- 핵심 기능 1: 시계와 남은 시간을 화면에 업데이트하는 함수 ---
        function updateDisplay() {
            // 남은 시간을 분과 초로 나눕니다.
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            
            // 1. 작은 디지털 시간 글씨 업데이트 (예: 25:00)
            digitalTimeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 2. 아날로그 시계 바늘 각도 계산 및 회전
            // 시계의 한 바퀴는 360도 입니다. 60분에 360도를 도니까 1분당 6도 회전합니다.
            const minDegree = (minutes * 6) + (seconds * 0.1); // 분침의 각도 (초가 지나갈 때마다 미세하게 움직임)
            const secDegree = seconds * 6; // 초침의 각도 (1초에 6도씩 움직임)

            minuteHand.style.transform = `rotate(${minDegree}deg)`;
            secondHand.style.transform = `rotate(${secDegree}deg)`;

            // 3. 겉의 원형 진행률 바 업데이트
            const progress = timeLeft / totalTime;
            const offset = circumference - (progress * circumference);
            circle.style.strokeDashoffset = offset;
        }

        // --- 핵심 기능 2: 모드(공부/휴식)를 변경하는 함수 ---
        function setMode(mode) {
            currentMode = mode;
            clearInterval(timerInterval); // 진행 중인 타이머를 멈춥니다.
            isRunning = false;
            
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');

            document.body.className = `mode-${mode}`; // 배경색 테마 변경

            if (mode === 'study') {
                timeLeft = defaultStudyTime * 60;
                totalTime = defaultStudyTime * 60;
                modeStudyBtn.className = "btn-hover bg-blue-500 text-white px-6 py-3 rounded-2xl text-xl font-bold shadow-md border-2 border-blue-300 w-32";
                modeBreakBtn.className = "btn-hover bg-transparent text-gray-300 px-6 py-3 rounded-2xl text-xl font-bold hover:bg-white/10 w-32";
                statusText.textContent = "우주선 출발 준비 중! (공부 시간)";
                character.textContent = "👨‍🚀";
                timeControls.style.display = 'flex'; // 탐험 모드일 때 시간 설정 보이기
            } else {
                timeLeft = 5 * 60;
                totalTime = 5 * 60;
                modeBreakBtn.className = "btn-hover bg-green-500 text-white px-6 py-3 rounded-2xl text-xl font-bold shadow-md border-2 border-green-300 w-32";
                modeStudyBtn.className = "btn-hover bg-transparent text-gray-300 px-6 py-3 rounded-2xl text-xl font-bold hover:bg-white/10 w-32";
                statusText.textContent = "우주 정거장에서 휴식 중~ (쉬는 시간)";
                character.textContent = "⛺";
                timeControls.style.display = 'none'; // 휴식 모드일 때 시간 설정 숨기기
            }
            updateDisplay(); // 변경된 시간으로 화면을 다시 그립니다.
        }

        // --- 핵심 기능 3: 타이머를 시작하는 함수 ---
        function startTimer() {
            if (isRunning) return; // 이미 실행 중이면 무시
            isRunning = true;
            
            initAudio(); // 버튼을 눌렀을 때 오디오 시스템을 깨워줍니다.

            startBtn.classList.add('hidden'); // 시작 버튼 숨기기
            pauseBtn.classList.remove('hidden'); // 일시정지 버튼 보이기
            
            // 타이머 작동 중에는 시간 설정 버튼을 흐리게 하고 클릭하지 못하게 막습니다.
            timeControls.style.opacity = '0.4';
            timeControls.style.pointerEvents = 'none';

            if(currentMode === 'study') {
                statusText.textContent = "우주 탐험 중! 집중해요!";
                character.textContent = "🚀";
            } else {
                statusText.textContent = "맛있는 간식 먹으며 쉬는 중~";
                character.textContent = "🍩";
            }

            // 1초(1000밀리초)마다 안에 있는 코드를 반복 실행합니다.
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--; // 시간을 1초 줄임
                    updateDisplay(); // 줄어든 시간으로 시계 업데이트
                    
                    // --- 5분 경과 알림 로직 (시각 + 청각) ---
                    // 남은 시간이 5분(300초) 단위로 나누어 떨어질 때 발동
                    if (timeLeft > 0 && timeLeft % 300 === 0 && timeLeft !== totalTime) {
                        playIntervalSound(); // '띠링!' 소리 재생
                        
                        // 캐릭터 머리 위에 메시지를 띄우고, 시계 테두리가 반짝거림
                        intervalMsg.classList.add('show');
                        timerDisplayContainer.classList.add('flash-glow');
                        
                        // 3초 뒤에 시각 효과 다시 숨기기
                        setTimeout(() => {
                            intervalMsg.classList.remove('show');
                            timerDisplayContainer.classList.remove('flash-glow');
                        }, 3000);
                    }

                } else {
                    completeTimer(); // 시간이 다 되면 타이머 완료 함수 실행
                }
            }, 1000);
        }

        // --- 핵심 기능 4: 타이머를 잠시 멈추는 함수 ---
        function pauseTimer() {
            clearInterval(timerInterval); // 반복 실행되던 타이머를 정지합니다.
            isRunning = false;
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            
            // 일시정지 중에는 다시 시간 설정을 바꿀 수 있게 합니다.
            timeControls.style.opacity = '1';
            timeControls.style.pointerEvents = 'auto';

            statusText.textContent = currentMode === 'study' ? "우주선 잠깐 정지! (일시정지)" : "휴식 잠깐 멈춤!";
            character.textContent = "🛑";
        }

        // --- 타이머 초기화 (처음 시간으로 되돌리기) ---
        function resetTimer() {
            timeControls.style.opacity = '1';
            timeControls.style.pointerEvents = 'auto';
            setMode(currentMode);
        }

        // --- 시간이 끝났을 때 보상을 주고 팝업을 띄우는 함수 ---
        function completeTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            
            // 타이머 완료 시 시간 설정 버튼 다시 활성화
            timeControls.style.opacity = '1';
            timeControls.style.pointerEvents = 'auto';

            if (currentMode === 'study') {
                // 랜덤으로 우주 보물 1개를 뽑아서 리스트에 추가합니다.
                const randomReward = rewards[Math.floor(Math.random() * rewards.length)];
                badges.push(randomReward);
                updateBadges(); // 화면에 보상을 추가해 그립니다.
                
                playCompleteSound(); // 탐험 완료 빰빠밤 사운드!
                
                modalTitle.textContent = "탐험 대성공!";
                modalDesc.textContent = "멋지게 집중했어요! 우주 보물을 찾았습니다!";
                modalReward.textContent = randomReward;
                modal.style.display = 'flex'; // 축하 팝업 띄우기
                
            } else {
                playCompleteSound(); // 휴식 완료 빰빠밤 사운드!
                
                modalTitle.textContent = "휴식 끝!";
                modalDesc.textContent = "에너지를 모두 채웠어요. 다시 탐험을 떠나볼까요?";
                modalReward.textContent = "🔋";
                modal.style.display = 'flex'; // 축하 팝업 띄우기
            }
        }

        // 모은 보물(배지)을 화면의 보물 상자 구역에 보여주는 함수
        function updateBadges() {
            if (badges.length > 0) {
                emptyBadgeMsg.style.display = 'none'; // '아직 보물이 없어요' 글씨 지우기
            }
            
            badgeContainer.innerHTML = ''; // 기존 배지 지우고 다시 그리기
            badges.forEach(badge => {
                const badgeEl = document.createElement('div');
                badgeEl.className = 'text-4xl animate-[popIn_0.5s_cubic-bezier(0.175,0.885,0.32,1.275)]';
                badgeEl.textContent = badge;
                badgeContainer.appendChild(badgeEl);
            });
        }

        // 버튼들과 기능들을 연결해줍니다. (클릭할 때마다 지정한 함수가 실행됨)
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        modeStudyBtn.addEventListener('click', () => setMode('study'));
        modeBreakBtn.addEventListener('click', () => setMode('break'));

        // --- 시간 설정 버튼 (플러스, 마이너스) 클릭 시 일어날 일 ---
        decreaseTimeBtn.addEventListener('click', () => {
            if (defaultStudyTime > 5) { // 시간은 최소 5분까지만 줄일 수 있어요.
                defaultStudyTime -= 5;
                studyTimeSetting.textContent = defaultStudyTime;
                if (currentMode === 'study' && !isRunning) {
                    setMode('study'); // 시간 변경 시 타이머 화면 즉시 업데이트
                }
            }
        });

        increaseTimeBtn.addEventListener('click', () => {
            if (defaultStudyTime < 60) { // 시간은 최대 60분까지만 늘릴 수 있어요.
                defaultStudyTime += 5;
                studyTimeSetting.textContent = defaultStudyTime;
                if (currentMode === 'study' && !isRunning) {
                    setMode('study'); // 시간 변경 시 타이머 화면 즉시 업데이트
                }
            }
        });

        // 팝업창에서 '다음으로!' 버튼을 누르면 일어날 일
        modalCloseBtn.addEventListener('click', () => {
            modal.style.display = 'none'; // 팝업창 숨기기
            // 공부가 끝났으면 휴식으로, 휴식이 끝났으면 공부로 자동으로 넘겨줍니다.
            if (currentMode === 'study') {
                setMode('break');
            } else {
                setMode('study');
            }
        });

        // 웹페이지가 처음 켜졌을 때 시계를 25분에 맞게 그려줍니다.
        updateDisplay();
    </script>
</body>
</html>
